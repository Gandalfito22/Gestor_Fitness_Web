<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Progreso Físico | Dashboard Premium</title>
    <meta name="description" content="Lleva un registro detallado de tus medidas corporales, peso y progreso físico con gráficos interactivos y exportación de datos.">
    <!-- Hojas de estilos y fuentes -->
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>Progreso Físico</h1>
            <div style="font-size: 0.9rem; color: var(--text-muted);">
                Dashboard de Mediciones Corporales
            </div>
        </header>

        <!-- Formulario de Nueva Medición -->
        <section class="card" aria-labelledby="form-heading">
            <h2 id="form-heading" class="card-title">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                Nueva Medición
            </h2>
            <form id="measurementForm" class="form-grid">
                <div class="form-group">
                    <label for="date">Fecha</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label for="weight">Peso (kg)</label>
                    <input type="number" step="0.1" id="weight" placeholder="e.g. 75.5" required>
                </div>
                <div class="form-group">
                    <label for="back">Ancho Espalda (cm)</label>
                    <input type="number" step="0.1" id="back" placeholder="e.g. 110.0" required>
                </div>
                <div class="form-group">
                    <label for="chest">Pecho (cm)</label>
                    <input type="number" step="0.1" id="chest" placeholder="e.g. 98.0" required>
                </div>
                <div class="form-group">
                    <label for="waist">Cintura (cm)</label>
                    <input type="number" step="0.1" id="waist" placeholder="e.g. 82.0" required>
                </div>
                <div class="form-group">
                    <label for="quad">Cuádriceps (cm)</label>
                    <input type="number" step="0.1" id="quad" placeholder="e.g. 58.0" required>
                </div>
                <div class="form-group">
                    <label for="bicepsFlex">Bíceps Contraído (cm)</label>
                    <input type="number" step="0.1" id="bicepsFlex" placeholder="e.g. 37.5" required>
                </div>
                <div class="form-group">
                    <label for="bicepsRel">Bíceps Relajado (cm)</label>
                    <input type="number" step="0.1" id="bicepsRel" placeholder="e.g. 34.0" required>
                </div>
                <div class="form-group form-group-full">
                    <label for="notes">Notas / Comentarios</label>
                    <input type="text" id="notes" placeholder="e.g. Entrenamiento post-pierna, ayunas">
                </div>
                <button type="submit" class="btn btn-primary btn-submit">
                    Guardar Medición
                </button>
            </form>
        </section>

        <!-- Grid Principal (Historial y Progreso) -->
        <main class="grid-main">
            <!-- Columna Izquierda: Historial -->
            <section class="card" aria-labelledby="history-heading">
                <h2 id="history-heading" class="card-title">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    Historial
                </h2>
                
                <div class="table-wrapper">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Peso (kg)</th>
                                <th>Notas</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Inyectado dinámicamente por JavaScript -->
                        </tbody>
                    </table>
                </div>

                <!-- Detalle del Registro Seleccionado -->
                <div id="detailsView" class="details-view hidden">
                    <h3 class="card-title" style="font-size: 1.1rem; border: none; margin-bottom: 1rem; padding-bottom: 0;">
                        Detalles del Registro
                    </h3>
                    <div id="detailsContent" class="details-grid">
                        <!-- Inyectado dinámicamente por JavaScript -->
                    </div>
                    <button onclick="deleteSelected()" class="btn btn-danger">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6"/></svg>
                        Eliminar Registro
                    </button>
                </div>
            </section>

            <!-- Columna Derecha: Gráfico -->
            <section class="card" aria-labelledby="chart-heading">
                <h2 id="chart-heading" class="card-title">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/></svg>
                    Progreso Visual
                </h2>
                
                <div class="form-group">
                    <label for="metricSelector">Métrica a Visualizar</label>
                    <select id="metricSelector" class="select-metric" onchange="updateChart()">
                        <option value="weight">Peso (kg)</option>
                        <option value="back">Ancho Espalda (cm)</option>
                        <option value="chest">Pecho (cm)</option>
                        <option value="waist">Cintura (cm)</option>
                        <option value="quad">Cuádriceps (cm)</option>
                        <option value="bicepsFlex">Bíceps Contraído (cm)</option>
                        <option value="bicepsRel">Bíceps Relajado (cm)</option>
                    </select>
                </div>

                <div class="chart-container">
                    <canvas id="myChart"></canvas>
                </div>
            </section>
        </main>

        <!-- Acciones de Exportación -->
        <footer class="btn-actions-container">
            <button onclick="exportCSV()" class="btn btn-success">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                Exportar CSV
            </button>
            <button onclick="exportPDF()" class="btn btn-danger" style="background: linear-gradient(135deg, #f43f5e 0%, #be123c 100%);">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
                Exportar PDF con Tabla
            </button>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>
</html>
