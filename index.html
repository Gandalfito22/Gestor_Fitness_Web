<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Progreso Físico | Dashboard Premium</title>
    <meta name="description" content="Lleva un registro detallado de tus medidas corporales, peso y progreso físico con gráficos interactivos y exportación de datos.">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

        :root {
            --text-primary: #ffffff;
            --text-muted: #cbd5e1;
            
            --color-primary: #8b5cf6;
            --color-accent: #06b6d4;
            --color-success: #10b981; 
            --color-danger: #f43f5e; 
            --color-info: #3b82f6;
            
            --font-sans: 'Outfit', sans-serif;
            --transition-smooth: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: linear-gradient(-45deg, #0f172a, #2e1065, #1e1b4b, #082f49);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            line-height: 1.6;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--color-accent); }

        .container { max-width: 1250px; margin: 0 auto; }

        /* Estilos para el nuevo logo en la cabecera */
        .header-logo {
            max-height: 55px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(6, 182, 212, 0.2));
            transition: var(--transition-smooth);
        }
        .header-logo:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 15px rgba(6, 182, 212, 0.4));
        }

        header {
            margin-bottom: 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1.5rem;
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
        }

        h1 {
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--color-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.03em;
            display: flex;
            align-items: center;
            gap: 1rem;
            text-shadow: 0 0 40px rgba(6, 182, 212, 0.3);
        }

        .card {
            background: rgba(15, 23, 42, 0.35);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: var(--transition-smooth);
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 40px 0 rgba(0, 0, 0, 0.4), 0 0 20px rgba(139, 92, 246, 0.2);
        }
        .card:hover::before { opacity: 1; }

        .card-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .card-title svg {
            color: var(--color-accent);
            filter: drop-shadow(0 0 8px var(--color-accent));
        }

        .grid-main { display: grid; grid-template-columns: 1fr; gap: 2rem; }
        @media (min-width: 1024px) { .grid-main { grid-template-columns: 1.1fr 1fr; } }

        .form-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
        @media (min-width: 640px) { .form-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 768px) { .form-grid { grid-template-columns: repeat(4, 1fr); } }

        .form-group { display: flex; flex-direction: column; gap: 0.6rem; }
        .form-group-full { grid-column: 1 / -1; }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        input, select {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.9rem 1.2rem;
            color: #fff;
            font-family: var(--font-sans);
            font-size: 1rem;
            outline: none;
            transition: var(--transition-smooth);
            backdrop-filter: blur(4px);
            width: 100%;
        }

        option { background-color: #0f172a; color: #ffffff; }
        input::placeholder { color: rgba(255, 255, 255, 0.3); }
        input:hover, select:hover { background: rgba(255, 255, 255, 0.06); border-color: rgba(255, 255, 255, 0.2); }
        input:focus, select:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--color-accent);
            box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.15), 0 0 20px rgba(6, 182, 212, 0.2);
            transform: translateY(-2px);
        }

        /* Botones Premium */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 0.75rem; padding: 1rem 2rem; border-radius: 14px;
            font-weight: 700; font-family: var(--font-sans); font-size: 0.95rem;
            text-transform: uppercase; letter-spacing: 0.05em;
            cursor: pointer; border: none; transition: var(--transition-smooth);
            position: relative; overflow: hidden; color: white;
            white-space: nowrap;
        }

        .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none !important; }

        .btn::after {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
            opacity: 0; transition: opacity 0.3s;
        }
        .btn:hover:not(:disabled)::after { opacity: 1; }
        .btn:active:not(:disabled) { transform: scale(0.97); }

        .btn-primary { background: linear-gradient(135deg, var(--color-primary), #c084fc); box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4); }
        .btn-primary:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(139, 92, 246, 0.6); }

        .btn-submit { grid-column: 1 / -1; margin-top: 1rem; font-size: 1.1rem; padding: 1.2rem; }

        .btn-success { background: linear-gradient(135deg, var(--color-success), #34d399); box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3); }
        .btn-success:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(16, 185, 129, 0.5); }

        .btn-danger { background: linear-gradient(135deg, var(--color-danger), #fb7185); box-shadow: 0 8px 20px rgba(244, 63, 94, 0.3); }
        .btn-danger:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(244, 63, 94, 0.5); }

        /* Nuevo botón Info (para enviar email) */
        .btn-info { background: linear-gradient(135deg, var(--color-info), #60a5fa); box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3); }
        .btn-info:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(59, 130, 246, 0.5); }

        .btn-actions-container {
            display: flex; flex-wrap: wrap; gap: 1.5rem; margin-top: 1rem;
        }

        /* Tabla */
        .table-wrapper {
            overflow-x: auto; border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0, 0, 0, 0.2);
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: rgba(255, 255, 255, 0.05); color: var(--text-muted);
            font-weight: 700; font-size: 0.85rem; text-transform: uppercase;
            letter-spacing: 0.1em; padding: 1.2rem; border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        td {
            padding: 1.2rem; font-size: 0.95rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); transition: var(--transition-smooth);
        }
        tr { cursor: pointer; transition: var(--transition-smooth); }
        tr:hover td { background: rgba(255, 255, 255, 0.05); transform: scale(1.01); }
        tr.selected td { background: rgba(6, 182, 212, 0.15) !important; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        tr.selected { border-left: 4px solid var(--color-accent); }

        /* Vista de Detalles */
        .details-view {
            margin-top: 2rem; padding: 2rem;
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }
        .details-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.2rem; margin-bottom: 2rem; }
        @media (min-width: 640px) { .details-grid { grid-template-columns: repeat(4, 1fr); } }
        
        .detail-item {
            display: flex; flex-direction: column; background: rgba(0, 0, 0, 0.2);
            padding: 1rem; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--transition-smooth);
        }
        .detail-item:hover { background: rgba(255, 255, 255, 0.05); transform: translateY(-2px); border-color: rgba(255, 255, 255, 0.15); }
        .detail-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.3rem; }
        .detail-val { font-size: 1.25rem; font-weight: 700; color: var(--color-accent); text-shadow: 0 0 10px rgba(6, 182, 212, 0.3); }
        .detail-notes { grid-column: 1 / -1; background: rgba(139, 92, 246, 0.1); border-color: rgba(139, 92, 246, 0.2); }
        .detail-notes .detail-val { color: #fff; text-shadow: none; font-size: 1rem; font-weight: 400; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .hidden { display: none !important; }

        .chart-container {
            position: relative; width: 100%; margin-top: 1.5rem; padding: 1rem;
            background: rgba(0, 0, 0, 0.2); border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.05);
            height: 350px;
        }
        .select-metric { width: 100%; margin-bottom: 1.5rem; font-size: 1.1rem; }

        /* Estilos del Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        
        .modal-content {
            width: 90%; max-width: 450px;
            transform: translateY(30px) scale(0.95);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 0;
        }
        .modal-overlay.active .modal-content { transform: translateY(0) scale(1); }

        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.5rem;
        }
        .btn-close {
            background: none; border: none; color: var(--text-muted); cursor: pointer;
            padding: 0.5rem; border-radius: 50%; transition: var(--transition-smooth);
        }
        .btn-close:hover { background: rgba(255,255,255,0.1); color: #fff; }

        /* Toast Notifications */
        .toast-container {
            position: fixed; top: 20px; right: 20px; z-index: 9999;
            display: flex; flex-direction: column; gap: 10px;
        }
        .toast {
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            border-left: 4px solid var(--color-accent);
            color: #fff; padding: 1rem 1.5rem; border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex; align-items: center; gap: 12px;
            transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .toast.show { transform: translateX(0); }
        .toast.error { border-left-color: var(--color-danger); }
        .toast.success { border-left-color: var(--color-success); }
        
        .spinner {
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <div class="container">
        <header>
            <h1>Progreso Físico</h1>
            <!-- Reemplaza el enlace de abajo por el de tu foto sin fondo. Ej: src="mi-logo.png" -->
            <img id="appLogo" src="logo.png" alt="Logo de la app" class="header-logo" crossorigin="anonymous">
        </header>

        <section class="card" aria-labelledby="form-heading">
            <h2 id="form-heading" class="card-title">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                Nueva Medición
            </h2>
            <form id="measurementForm" class="form-grid">
                <div class="form-group">
                    <label for="date">Fecha</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label for="weight">Peso (kg)</label>
                    <input type="number" step="0.1" id="weight" placeholder="e.g. 75.5" required>
                </div>
                <div class="form-group">
                    <label for="back">Ancho Espalda (cm)</label>
                    <input type="number" step="0.1" id="back" placeholder="e.g. 110.0" required>
                </div>
                <div class="form-group">
                    <label for="chest">Pecho (cm)</label>
                    <input type="number" step="0.1" id="chest" placeholder="e.g. 98.0" required>
                </div>
                <div class="form-group">
                    <label for="waist">Cintura (cm)</label>
                    <input type="number" step="0.1" id="waist" placeholder="e.g. 82.0" required>
                </div>
                <div class="form-group">
                    <label for="quad">Cuádriceps (cm)</label>
                    <input type="number" step="0.1" id="quad" placeholder="e.g. 58.0" required>
                </div>
                <div class="form-group">
                    <label for="bicepsFlex">Bíceps Contraído (cm)</label>
                    <input type="number" step="0.1" id="bicepsFlex" placeholder="e.g. 37.5" required>
                </div>
                <div class="form-group">
                    <label for="bicepsRel">Bíceps Relajado (cm)</label>
                    <input type="number" step="0.1" id="bicepsRel" placeholder="e.g. 34.0" required>
                </div>
                <div class="form-group form-group-full">
                    <label for="notes">Notas / Comentarios</label>
                    <input type="text" id="notes" placeholder="e.g. Entrenamiento post-pierna, ayunas">
                </div>
                <button type="submit" class="btn btn-primary btn-submit">
                    Guardar Medición
                </button>
            </form>
        </section>

        <main class="grid-main">
            <section class="card" aria-labelledby="history-heading">
                <h2 id="history-heading" class="card-title">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    Historial
                </h2>
                
                <div class="table-wrapper">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Peso (kg)</th>
                                <th>Notas</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>

                <div id="detailsView" class="details-view hidden">
                    <h3 class="card-title" style="font-size: 1.1rem; border: none; margin-bottom: 1rem; padding-bottom: 0;">
                        Detalles del Registro
                    </h3>
                    <div id="detailsContent" class="details-grid"></div>
                    <button onclick="deleteSelected()" class="btn btn-danger">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6"/></svg>
                        Eliminar Registro
                    </button>
                </div>
            </section>

            <section class="card" aria-labelledby="chart-heading">
                <h2 id="chart-heading" class="card-title">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/></svg>
                    Progreso Visual
                </h2>
                
                <div class="form-group">
                    <label for="metricSelector">Métrica a Visualizar</label>
                    <select id="metricSelector" class="select-metric" onchange="updateChart()">
                        <option value="weight">Peso (kg)</option>
                        <option value="back">Ancho Espalda (cm)</option>
                        <option value="chest">Pecho (cm)</option>
                        <option value="waist">Cintura (cm)</option>
                        <option value="quad">Cuádriceps (cm)</option>
                        <option value="bicepsFlex">Bíceps Contraído (cm)</option>
                        <option value="bicepsRel">Bíceps Relajado (cm)</option>
                    </select>
                </div>

                <div class="chart-container">
                    <canvas id="myChart"></canvas>
                </div>
            </section>
        </main>

        <footer class="btn-actions-container">
            <button onclick="exportCSV()" class="btn btn-success">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                Exportar CSV
            </button>
            <button onclick="exportPDF()" class="btn btn-danger" style="background: linear-gradient(135deg, #f43f5e 0%, #be123c 100%);">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
                Exportar PDF
            </button>
            <!-- BOTÓN PARA COMPARTIR NATIVAMENTE EN MÓVILES -->
            <button onclick="sharePDF()" class="btn btn-info">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                Compartir PDF
            </button>
        </footer>
    </div>

    <script>
        // --- SISTEMA DE TOASTS (Reemplazo moderno de alert) ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icon = type === 'success' 
                ? '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>'
                : '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>';

            toast.innerHTML = `${icon} <span>${message}</span>`;
            container.appendChild(toast);

            // Animar entrada
            setTimeout(() => toast.classList.add('show'), 10);

            // Remover después de 3 segundos
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }


        // --- LÓGICA PRINCIPAL (Basado en app.js) ---
        let data = JSON.parse(localStorage.getItem('fitnessData')) || [];
        let chart = null;
        let selectedIndex = -1;

        const metricLabels = {
            weight: 'Peso (kg)',
            back: 'Ancho Espalda (cm)',
            chest: 'Pecho (cm)',
            waist: 'Cintura (cm)',
            quad: 'Cuádriceps (cm)',
            bicepsFlex: 'Bíceps Contraído (cm)',
            bicepsRel: 'Bíceps Relajado (cm)'
        };

        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').value = today;
            sortDataByDate();
            render();
        });

        function sortDataByDate() {
            data.sort((a, b) => new Date(a.date) - new Date(b.date));
        }

        function render() {
            const body = document.getElementById('tableBody');
            const detailsView = document.getElementById('detailsView');
            
            if (data.length === 0) {
                body.innerHTML = `
                    <tr>
                        <td colspan="3" style="text-align: center; color: var(--text-muted); padding: 2rem;">
                            No hay mediciones registradas. ¡Agrega tu primera medición arriba!
                        </td>
                    </tr>
                `;
                detailsView.classList.add('hidden');
                updateChart();
                return;
            }

            const tableRows = [...data]
                .map((d, indexInSorted) => ({ d, originalIndex: indexInSorted }))
                .reverse()
                .map(({ d, originalIndex }) => {
                    const isSelected = originalIndex === selectedIndex;
                    return `
                        <tr onclick="selectRow(${originalIndex})" class="${isSelected ? 'selected' : ''}">
                            <td>${formatDate(d.date)}</td>
                            <td style="font-weight: 600; color: var(--color-accent);">${d.weight} kg</td>
                            <td style="color: var(--text-muted); max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                                ${d.notes || '—'}
                            </td>
                        </tr>
                    `;
                })
                .join('');
                
            body.innerHTML = tableRows;

            if (selectedIndex > -1 && selectedIndex < data.length) {
                const d = data[selectedIndex];
                document.getElementById('detailsContent').innerHTML = `
                    <div class="detail-item"><span class="detail-label">Fecha</span><span class="detail-val" style="color: #fff;">${formatDate(d.date)}</span></div>
                    <div class="detail-item"><span class="detail-label">Peso</span><span class="detail-val">${d.weight} kg</span></div>
                    <div class="detail-item"><span class="detail-label">Espalda</span><span class="detail-val">${d.back} cm</span></div>
                    <div class="detail-item"><span class="detail-label">Pecho</span><span class="detail-val">${d.chest} cm</span></div>
                    <div class="detail-item"><span class="detail-label">Cintura</span><span class="detail-val">${d.waist} cm</span></div>
                    <div class="detail-item"><span class="detail-label">Cuádriceps</span><span class="detail-val">${d.quad} cm</span></div>
                    <div class="detail-item"><span class="detail-label">Bíceps Cont.</span><span class="detail-val">${d.bicepsFlex} cm</span></div>
                    <div class="detail-item"><span class="detail-label">Bíceps Rel.</span><span class="detail-val">${d.bicepsRel} cm</span></div>
                    <div class="detail-item detail-notes">
                        <span class="detail-label">Notas</span>
                        <span class="detail-val" style="color: var(--text-primary); font-size: 0.95rem; font-weight: normal; margin-top: 0.25rem;">
                            ${d.notes || 'Sin anotaciones adicionales.'}
                        </span>
                    </div>
                `;
                detailsView.classList.remove('hidden');
            } else {
                detailsView.classList.add('hidden');
            }
            updateChart();
        }

        function formatDate(dateStr) {
            const options = { year: 'numeric', month: 'short', day: 'numeric', timeZone: 'UTC' };
            return new Date(dateStr).toLocaleDateString('es-ES', options);
        }

        function selectRow(index) {
            selectedIndex = selectedIndex === index ? -1 : index;
            render();
        }

        // --- SISTEMA MENSAJES CUSTOM EN LUGAR DE CONFIRM (Mejora UX) ---
        // Para simplificar y no usar librerías extras, mantenemos un pequeño confirm nativo 
        // solo para eliminaciones críticas, ya que construir un modal complejo de confirmación
        // inflaría mucho este archivo. Los 'alerts' sí se han sustituido por Toasts.
        function deleteSelected() {
            if (selectedIndex > -1 && selectedIndex < data.length) {
                if (confirm('¿Estás seguro de que deseas eliminar esta medición?')) {
                    data.splice(selectedIndex, 1);
                    localStorage.setItem('fitnessData', JSON.stringify(data));
                    selectedIndex = -1;
                    render();
                    showToast('Medición eliminada correctamente');
                }
            }
        }

        document.getElementById('measurementForm').onsubmit = (e) => {
            e.preventDefault();
            
            const entry = {
                date: document.getElementById('date').value,
                weight: parseFloat(document.getElementById('weight').value),
                back: parseFloat(document.getElementById('back').value),
                chest: parseFloat(document.getElementById('chest').value),
                waist: parseFloat(document.getElementById('waist').value),
                quad: parseFloat(document.getElementById('quad').value),
                bicepsFlex: parseFloat(document.getElementById('bicepsFlex').value),
                bicepsRel: parseFloat(document.getElementById('bicepsRel').value),
                notes: document.getElementById('notes').value.trim()
            };

            const existingIndex = data.findIndex(d => d.date === entry.date);
            if (existingIndex > -1) {
                if (confirm(`Ya existe un registro para la fecha ${entry.date}. ¿Deseas sobreescribirlo?`)) {
                    data[existingIndex] = entry;
                } else {
                    return;
                }
            } else {
                data.push(entry);
            }

            localStorage.setItem('fitnessData', JSON.stringify(data));
            sortDataByDate();
            selectedIndex = -1; 
            render();
            showToast('Medición guardada exitosamente');
            
            document.getElementById('measurementForm').reset();
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
        };

        function updateChart() {
            const ctx = document.getElementById('myChart').getContext('2d');
            const metric = document.getElementById('metricSelector').value;
            
            if (chart) chart.destroy();
            if (data.length === 0) return;

            const labels = data.map(d => formatDate(d.date));
            const values = data.map(d => d[metric]);

            const gradient = ctx.createLinearGradient(0, 0, 0, 300);
            gradient.addColorStop(0, 'rgba(6, 182, 212, 0.3)');
            gradient.addColorStop(1, 'rgba(6, 182, 212, 0.0)');

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: metricLabels[metric],
                        data: values,
                        borderColor: '#06b6d4',
                        borderWidth: 3,
                        backgroundColor: gradient,
                        fill: true,
                        tension: 0.3,
                        pointBackgroundColor: '#06b6d4',
                        pointBorderColor: 'rgba(255, 255, 255, 0.8)',
                        pointBorderWidth: 1.5,
                        pointRadius: 5,
                        pointHoverRadius: 7
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleFont: { family: 'Outfit', size: 13 },
                            bodyFont: { family: 'Outfit', size: 14, weight: 'bold' },
                            borderColor: 'rgba(255, 255, 255, 0.1)',
                            borderWidth: 1,
                            displayColors: false,
                            callbacks: {
                                label: function(context) {
                                    return `${context.parsed.y} ${metric === 'weight' ? 'kg' : 'cm'}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: { grid: { color: 'rgba(255, 255, 255, 0.04)', borderColor: 'transparent' }, ticks: { color: '#94a3b8', font: { family: 'Outfit', size: 11 } } },
                        y: { grid: { color: 'rgba(255, 255, 255, 0.04)', borderColor: 'transparent' }, ticks: { color: '#94a3b8', font: { family: 'Outfit', size: 11 } } }
                    }
                }
            });
        }

        function exportCSV() {
            if (data.length === 0) {
                showToast('No hay datos para exportar', 'error');
                return;
            }
            const headers = 'Fecha,Peso (kg),Espalda (cm),Pecho (cm),Cintura (cm),Cuadriceps (cm),Biceps Contraido (cm),Biceps Relajado (cm),Notas\n';
            const rows = data.map(d => [
                d.date, d.weight, d.back, d.chest, d.waist, d.quad, d.bicepsFlex, d.bicepsRel,
                `"${(d.notes || '').replace(/"/g, '""')}"`
            ].join(',')).join('\n');

            const csvContent = "\uFEFF" + headers + rows;
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'registro_progreso_fisico.csv';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }

        // Refactorizado para reutilizar la generación del documento PDF
        function generatePDFDocument() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('landscape', 'pt', 'a4');
            
            doc.setFillColor(11, 15, 25);
            doc.rect(0, 0, 842, 80, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFont("helvetica", "bold");
            doc.setFontSize(22);
            doc.text("Reporte de Progreso Fisico", 40, 48);
            
            // EXTRAER E INSERTAR EL LOGO CENTRADO EN EL PDF
            try {
                const logo = document.getElementById('appLogo');
                // Verificamos que la imagen exista y se haya cargado completamente
                if (logo && logo.complete && logo.naturalWidth > 0) {
                    // Calculamos la proporción para no deformar la imagen
                    const imgRatio = logo.naturalWidth / logo.naturalHeight;
                    const pdfLogoHeight = 46; // Altura máxima en la cabecera para que respire
                    const pdfLogoWidth = pdfLogoHeight * imgRatio;
                    const centerX = (842 - pdfLogoWidth) / 2; // 842 es el ancho de un A4 apaisado
                    
                    // Insertamos como PNG para respetar la transparencia y que no sea un pegote
                    doc.addImage(logo, 'PNG', centerX, 17, pdfLogoWidth, pdfLogoHeight);
                }
            } catch (err) {
                console.warn("No se pudo cargar el logo en el PDF (Posible error de CORS):", err);
            }

            doc.setFont("helvetica", "normal");
            doc.setFontSize(10);
            doc.setTextColor(148, 163, 184);
            const fechaReporte = new Date().toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' });
            doc.text(`Generado el: ${fechaReporte}`, 650, 48);

            let y = 120;
            doc.setFillColor(30, 41, 59);
            doc.rect(40, y, 762, 25, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFont("helvetica", "bold");
            doc.setFontSize(9);
            
            const headers = [
                { title: "Fecha", w: 70 }, { title: "Peso", w: 50 }, { title: "Espalda", w: 60 },
                { title: "Pecho", w: 60 }, { title: "Cintura", w: 60 }, { title: "Cuadr.", w: 60 },
                { title: "B.Flex", w: 60 }, { title: "B.Rel", w: 60 }, { title: "Notas", w: 282 }
            ];
            
            let currentX = 45;
            headers.forEach(h => { doc.text(h.title, currentX, y + 16); currentX += h.w; });
            
            y += 25;
            doc.setFont("helvetica", "normal");
            doc.setTextColor(30, 41, 59);

            const reversedData = [...data].reverse();
            reversedData.forEach((d, idx) => {
                if (idx % 2 === 0) {
                    doc.setFillColor(248, 250, 252);
                    doc.rect(40, y, 762, 20, 'F');
                }
                
                let rowX = 45;
                doc.text(formatDate(d.date), rowX, y + 13); rowX += headers[0].w;
                doc.text(`${d.weight} kg`, rowX, y + 13); rowX += headers[1].w;
                doc.text(`${d.back} cm`, rowX, y + 13); rowX += headers[2].w;
                doc.text(`${d.chest} cm`, rowX, y + 13); rowX += headers[3].w;
                doc.text(`${d.waist} cm`, rowX, y + 13); rowX += headers[4].w;
                doc.text(`${d.quad} cm`, rowX, y + 13); rowX += headers[5].w;
                doc.text(`${d.bicepsFlex} cm`, rowX, y + 13); rowX += headers[6].w;
                doc.text(`${d.bicepsRel} cm`, rowX, y + 13); rowX += headers[7].w;
                
                let noteText = d.notes || '';
                if (noteText.length > 60) noteText = noteText.substring(0, 57) + '...';
                doc.text(noteText, rowX, y + 13);
                
                doc.setDrawColor(226, 232, 240);
                doc.line(40, y + 20, 802, y + 20);
                y += 20;
                
                if (y > 520) {
                    doc.addPage();
                    y = 50;
                    doc.setFillColor(30, 41, 59);
                    doc.rect(40, y, 762, 25, 'F');
                    doc.setTextColor(255, 255, 255);
                    doc.setFont("helvetica", "bold");
                    let newPageX = 45;
                    headers.forEach(h => { doc.text(h.title, newPageX, y + 16); newPageX += h.w; });
                    y += 25;
                    doc.setFont("helvetica", "normal");
                    doc.setTextColor(30, 41, 59);
                }
            });
            
            return doc;
        }

        function exportPDF() {
            if (data.length === 0) {
                showToast('No hay datos para exportar', 'error');
                return;
            }
            const doc = generatePDFDocument();
            doc.save('registro_progreso_fisico.pdf');
        }

        // --- LÓGICA DE COMPARTICIÓN NATIVA (WEB SHARE API) ---
        async function sharePDF() {
            if (data.length === 0) {
                showToast('No hay datos para compartir', 'error');
                return;
            }

            try {
                // 1. Generar el PDF
                const doc = generatePDFDocument();
                
                // 2. Convertir el PDF a un archivo real en memoria (Blob)
                const pdfBlob = doc.output('blob');
                const file = new File([pdfBlob], 'Progreso_Fisico.pdf', { type: 'application/pdf' });

                // 3. Invocar el menú nativo del móvil (donde el usuario elige Gmail, WhatsApp, etc.)
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        title: 'Mi Progreso Físico',
                        text: 'Te comparto mi historial de progreso físico adjunto en PDF.',
                        files: [file]
                    });
                } else {
                    // Fallback si el dispositivo no soporta compartir archivos (ej. algunos PCs)
                    showToast('Tu dispositivo no soporta compartir directamente. Descargando el PDF...', 'error');
                    exportPDF(); 
                }
            } catch (error) {
                console.error('Error al compartir:', error);
                // Evitar mostrar un error falso si el usuario simplemente cerró el menú de compartir sin elegir app
                if (error.name !== 'AbortError') {
                    showToast('No se pudo compartir el documento', 'error');
                }
            }
        }
    </script>
</body>
